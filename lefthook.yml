pre-commit:
  parallel: true
  commands:
    frontend-lint:
      root: "frontend/"
      glob: "frontend/**/*.{ts,tsx,js,mjs}"
      exclude: "frontend/wailsjs/**"
      run: npx eslint --no-warn-ignored {staged_files}

    go-lint:
      glob: "*.go|internal/**/*.go"
      exclude: "backend/**"
      run: bash .githooks/go-lint-staged.sh {staged_files}
