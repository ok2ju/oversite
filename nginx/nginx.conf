events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server web:3000;
    }

    upstream api {
        server api:8080;
    }

    upstream ws {
        server ws:8081;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js HMR WebSocket (development)
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # REST API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500m;  # demo uploads up to 500MB
        }

        # Health checks (accessible at both /healthz and /api/healthz)
        location = /healthz {
            proxy_pass http://api/healthz;
        }

        location = /readyz {
            proxy_pass http://api/readyz;
        }

        location = /api/healthz {
            proxy_pass http://api/healthz;
        }

        location = /api/readyz {
            proxy_pass http://api/readyz;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;  # 24h for long-lived WS connections
            proxy_send_timeout 86400s;
        }
    }
}
