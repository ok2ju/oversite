name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp wails.json productVersion
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg v "$APP_VERSION" '.info.productVersion = $v' wails.json > "$tmp"
          mv "$tmp" wails.json

      - name: Build (universal)
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: wails build -platform darwin/universal -clean -ldflags "-X main.version=$APP_VERSION"

      - name: Package as zip
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent oversite.app oversite-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oversite-macos-universal
          path: build/bin/oversite-macos-universal.zip

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        shell: bash
        run: go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp wails.json productVersion
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg v "$APP_VERSION" '.info.productVersion = $v' wails.json > "$tmp"
          mv "$tmp" wails.json

      - name: Build
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: wails build -platform "windows/$ARCH" -clean -ldflags "-X main.version=$APP_VERSION"

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/oversite.exe -DestinationPath "build/bin/oversite-windows-${env:ARCH}.zip"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oversite-windows-${{ matrix.arch }}
          path: build/bin/oversite-windows-${{ matrix.arch }}.zip

  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp wails.json productVersion
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg v "$APP_VERSION" '.info.productVersion = $v' wails.json > "$tmp"
          mv "$tmp" wails.json

      - name: Build
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: wails build -platform linux/amd64 -clean -tags webkit2_41 -ldflags "-X main.version=$APP_VERSION"

      - name: Package as tar.gz
        working-directory: build/bin
        run: tar -czf oversite-linux-amd64.tar.gz oversite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oversite-linux-amd64
          path: build/bin/oversite-linux-amd64.tar.gz

  release:
    name: Publish draft release
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS
          draft: true
          generate_release_notes: true
